k8sServiceHost: 192.168.10.200
k8sServicePort: 6443
 
ipam:
  mode: kubernetes
 
ipv4:
  enabled: true
 
ipv6:
  enabled: false
 
routingMode: native
ipv4NativeRoutingCIDR: 10.244.0.0/16
autoDirectNodeRoutes: true
 
kubeProxyReplacement: false
 
devices: eth0
 
operator:
  replicas: 1
 
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
    service:
      type: NodePort
      nodePort: 31235
